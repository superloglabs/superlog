name: CI
on: 
  pull_request:
    branches: ["main"] 
jobs: 
  verify:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: install pnpm 
        uses: pnpm/action-setup@v4
      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm typecheck
      - name: build
        run: pnpm build
  tests:
    name: Run tests
    needs: verify
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5434/superlog
      BETTER_AUTH_SECRET: "a-very-long-dummy-signing-secret-for-ci-testing-purposes"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start Postgres
        run: |
          docker compose up -d postgres
          until docker compose exec -T postgres pg_isready -U postgres; do
            echo "Waiting for Postgres to be ready..."
            sleep 1
          done
      - name: Run Standard Packages Tests
        run: pnpm -r --if-present test
      - name: Run Database Package Tests
        run: pnpm --filter @superlog/db exec tsx --test src/*.test.ts