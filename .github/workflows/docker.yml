name: Docker

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: proxy
            dockerfile: apps/proxy/Dockerfile
          - service: worker
            dockerfile: apps/worker/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
          - service: collector
            dockerfile: infra/collector/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/superlog-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_OTEL_EXPORTER_OTLP_ENDPOINT=${{ vars.VITE_OTEL_EXPORTER_OTLP_ENDPOINT }}
            VITE_OTEL_EXPORTER_OTLP_HEADERS=${{ vars.VITE_OTEL_EXPORTER_OTLP_HEADERS }}
            VITE_OTEL_SERVICE_NAME=${{ vars.VITE_OTEL_SERVICE_NAME }}
