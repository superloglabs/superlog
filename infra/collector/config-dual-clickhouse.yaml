receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true
        max_request_body_size: 536870912
      grpc:
        endpoint: 0.0.0.0:4317
        include_metadata: true

  # AWS Data Firehose HTTP-endpoint ingest, fronted by the proxy. See the
  # primary config.yaml for the rationale (one receiver per encoding,
  # proxy-stamped x-superlog-project-id via include_metadata).
  awsfirehose/metrics:
    endpoint: 0.0.0.0:4433
    encoding: otlp_v1
    include_metadata: true
  awsfirehose/logs:
    endpoint: 0.0.0.0:4434
    encoding: cwlogs
    include_metadata: true

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Strip any client-supplied `superlog.*` attributes from every signal at
  # both span/log/datapoint and resource scope. The proxy is the only
  # authoritative source of `superlog.*` keys; without this strip a customer
  # could spoof another tenant by setting `superlog.project_id` themselves.
  transform/strip_superlog:
    error_mode: ignore
    trace_statements:
      - delete_matching_keys(span.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"
      - delete_matching_keys(spanevent.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"
      - delete_matching_keys(resource.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"
    log_statements:
      - delete_matching_keys(log.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"
      - delete_matching_keys(resource.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"
    metric_statements:
      - delete_matching_keys(datapoint.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"
      - delete_matching_keys(resource.attributes, "^superlog\\..*") where resource.attributes["superlog.internal.authoritative"] != "true"

  attributes/from_metadata/authoritative:
    actions:
      - key: superlog.internal.authoritative
        action: upsert
        from_context: metadata.x-superlog-authoritative

  attributes/from_metadata/project_id:
    actions:
      - key: superlog.project_id
        action: upsert
        from_context: metadata.x-superlog-project-id

  groupbyattrs/project_id:
    keys:
      - superlog.project_id

exporters:
  clickhouse:
    endpoint: ${env:CLICKHOUSE_ENDPOINT}
    database: ${env:CLICKHOUSE_DB}
    username: ${env:CLICKHOUSE_USER}
    password: ${env:CLICKHOUSE_PASSWORD}
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_tables:
      gauge:
        name: otel_metrics_gauge
      sum:
        name: otel_metrics_sum
      summary:
        name: otel_metrics_summary
      histogram:
        name: otel_metrics_histogram
      exponential_histogram:
        name: otel_metrics_exp_histogram
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000

  clickhouse/aws:
    endpoint: ${env:CLICKHOUSE_SECONDARY_ENDPOINT}
    database: ${env:CLICKHOUSE_SECONDARY_DB}
    username: ${env:CLICKHOUSE_SECONDARY_USER}
    password: ${env:CLICKHOUSE_SECONDARY_PASSWORD}
    create_schema: false
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_tables:
      gauge:
        name: otel_metrics_gauge
      sum:
        name: otel_metrics_sum
      summary:
        name: otel_metrics_summary
      histogram:
        name: otel_metrics_histogram
      exponential_histogram:
        name: otel_metrics_exp_histogram
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/from_metadata/authoritative, transform/strip_superlog, attributes/from_metadata/project_id, groupbyattrs/project_id, batch]
      exporters: [clickhouse, clickhouse/aws]
    logs:
      receivers: [otlp, awsfirehose/logs]
      processors: [attributes/from_metadata/authoritative, transform/strip_superlog, attributes/from_metadata/project_id, groupbyattrs/project_id, batch]
      exporters: [clickhouse, clickhouse/aws]
    metrics:
      receivers: [otlp, awsfirehose/metrics]
      processors: [attributes/from_metadata/authoritative, transform/strip_superlog, attributes/from_metadata/project_id, groupbyattrs/project_id, batch]
      exporters: [clickhouse, clickhouse/aws]
  telemetry:
    logs:
      level: info
